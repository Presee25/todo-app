<!DOCTYPE html>
<html>
<head>
    <title>My To-Do App</title>

    <style>
        body {
            font-family: Arial;
            background-color: #f4f4f4;
            text-align: center;
        }

        .container {
            background: white;
            padding: 20px;
            width: 400px;
            margin: auto;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        input {
            padding: 10px;
            width: 70%;
        }

        button {
            padding: 10px;
            background-color: green;
            color: white;
            border: none;
            cursor: pointer;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            background: #eee;
            margin: 10px;
            padding: 10px;
            border-radius: 5px;
        }

        a {
            margin-left: 10px;
            text-decoration: none;
        }
    </style>
</head>

<body>

    <h1>🚀 My To-Do App</h1>

    <div class="container">

        <form method="POST">
            <input type="text" name="task" placeholder="Enter task">
            <button type="submit">Add</button>
        </form>

        <ul>
            {% for task in tasks %}
                <li>

                    {% if task[2] == 1 %}
                        <s>{{ task[1] }}</s>
                    {% else %}
                        {{ task[1] }}
                    {% endif %}

                    <a href="/complete/{{ task[0] }}">✔</a>
                    <a href="/edit/{{ task[0] }}">✏️</a>
                    <a href="/delete/{{ task[0] }}">❌</a>

                </li>
            {% endfor %}
        </ul>

    </div>

</body>
</html>
